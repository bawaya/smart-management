<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ניהול חכם — אין חיבור לאינטרנט</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        height: 100%;
        font-family: system-ui, -apple-system, 'Segoe UI', 'Noto Sans Hebrew', sans-serif;
        background: #0f0f1a;
        color: #f3f4f6;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }
      .card {
        max-width: 28rem;
        width: 100%;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(245, 158, 11, 0.25);
        border-radius: 1rem;
        padding: 2.5rem 2rem;
        text-align: center;
      }
      .brand {
        color: #f59e0b;
        font-size: 1.75rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
      }
      .icon {
        font-size: 3rem;
        margin-bottom: 1rem;
      }
      h1 {
        font-size: 1.125rem;
        color: #f3f4f6;
        margin-bottom: 0.5rem;
      }
      p {
        font-size: 0.9rem;
        color: #9ca3af;
        margin-bottom: 1.5rem;
      }
      button {
        background: #f59e0b;
        color: #111;
        font-weight: 700;
        font-size: 0.9rem;
        padding: 0.625rem 1.5rem;
        border: none;
        border-radius: 0.5rem;
        cursor: pointer;
      }
      button:hover { background: #d97706; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon" aria-hidden="true">📡</div>
      <p class="brand">ניהול חכם</p>
      <h1>אין חיבור לאינטרנט</h1>
      <p>בדוק את החיבור ונסה שוב.</p>
      <button type="button" onclick="location.reload()">נסה שוב</button>
    </div>
  </body>
</html>
