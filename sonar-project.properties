sonar.projectKey=bawaya_smart-management
sonar.organization=bawaya

sonar.projectName=Smart Management
sonar.projectVersion=0.1.0

sonar.sources=src
sonar.tests=src,tests
sonar.test.inclusions=src/**/*.{test,spec}.{ts,tsx},tests/**/*.{test,spec}.{ts,tsx}

sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/.vercel/**,\
  **/.wrangler/**,\
  **/coverage/**,\
  **/dist/**,\
  **/build/**,\
  **/*.d.ts,\
  public/**,\
  scripts/**,\
  data/**,\
  docs/**

sonar.coverage.exclusions=\
  src/__tests__/**,\
  src/**/*.{test,spec}.{ts,tsx},\
  src/types/**,\
  src/env.d.ts,\
  src/middleware.ts,\
  src/app/**/layout.tsx,\
  src/app/**/page.tsx,\
  next.config.mjs,\
  tailwind.config.ts,\
  postcss.config.mjs,\
  vitest.config.ts

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8
